name: feature-pipeline
description: |
  Feature development pipeline for the task tracker.
  Implement node uses the dev team, review node uses the review team.
  The review node extends with verification-enforcer for extra rigour.

provider: claude

nodes:
  - id: implement
    command: implement
    image: sdlc-worker:dev-team
    context: fresh

  - id: review
    command: review
    image: sdlc-worker:review-team
    depends_on: [implement]
    context: fresh
    team_extend:
      agents:
        - sdlc-core:verification-enforcer

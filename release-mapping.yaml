# Knowledge base plugin — orthogonal to SDLC option choice. EPIC #105.
# Components added incrementally by sub-features 3-12 of the EPIC. The agents,
# skills, and templates blocks below grow as each sub-feature lands.
sdlc-knowledge-base:
  agents:
    - source: agents/knowledge-base/research-librarian.md
    - source: agents/knowledge-base/synthesis-librarian.md
    - source: agents/knowledge-base/agent-knowledge-updater.md
  skills:
    - source: skills/kb-init/SKILL.md
    - source: skills/kb-init/templates/claude-md-section.md
    # Starter pack — three example library files (dogfood from
    # the Agentic SDLC research) plus shelf-index and log seed.
    # kb-init optionally copies these into a fresh project's library/.
    - source: skills/kb-init/templates/starter-pack/library/agentic-sdlc-options.md
    - source: skills/kb-init/templates/starter-pack/library/agent-suitability-rubric.md
    - source: skills/kb-init/templates/starter-pack/library/specification-formality-and-agent-performance.md
    - source: skills/kb-init/templates/starter-pack/library/_shelf-index.md
    - source: skills/kb-init/templates/starter-pack/library/log.md
    - source: skills/kb-rebuild-indexes/SKILL.md
    - source: skills/kb-rebuild-indexes/templates/shelf-index-example.md
    - source: skills/kb-ingest/SKILL.md
    - source: skills/kb-query/SKILL.md
    - source: skills/kb-lint/SKILL.md
    - source: skills/kb-validate-citations/SKILL.md
    - source: skills/kb-promote-answer-to-library/SKILL.md
    - source: skills/kb-staleness-check/SKILL.md
    - source: plugins/sdlc-knowledge-base/skills/kb-register-library/SKILL.md
    - source: plugins/sdlc-knowledge-base/skills/kb-audit-query/SKILL.md
    - source: plugins/sdlc-knowledge-base/skills/kb-setup-consulting/SKILL.md
  scripts:
    # Authored in-plugin; listed for packaging audit. Ship in-place.
    - source: plugins/sdlc-knowledge-base/scripts/__init__.py
    - source: plugins/sdlc-knowledge-base/scripts/registry.py
    - source: plugins/sdlc-knowledge-base/scripts/priming.py
    - source: plugins/sdlc-knowledge-base/scripts/attribution.py
    - source: plugins/sdlc-knowledge-base/scripts/shelf_index_header.py
    - source: plugins/sdlc-knowledge-base/scripts/orchestrator.py
    - source: plugins/sdlc-knowledge-base/scripts/audit.py

# Programme SDLC plugin — formal waterfall with mandatory cross-phase review. EPIC #178.
# Method 1 substrate: 5 skills (commission-programme, phase-init, phase-gate, phase-review,
# traceability-export), 5 scripts (parser, gates, traceability, package init files), 3
# templates (requirements/design/test specs), and plugin-root bundle artefacts.
sdlc-programme:
  skills:
    - source: skills/commission-programme/SKILL.md
    - source: skills/phase-init/SKILL.md
    - source: skills/phase-gate/SKILL.md
    - source: skills/phase-review/SKILL.md
    - source: skills/traceability-export/SKILL.md
  scripts:
    # Authored in-plugin; listed for packaging audit. Ship in-place.
    - source: plugins/sdlc-programme/scripts/__init__.py
    - source: plugins/sdlc-programme/scripts/programme/__init__.py
    - source: plugins/sdlc-programme/scripts/programme/spec_parser.py
    - source: plugins/sdlc-programme/scripts/programme/gates.py
    - source: plugins/sdlc-programme/scripts/programme/traceability.py
  # Templates and plugin-root bundle artefacts ship in-place with the plugin. They
  # live under plugins/sdlc-programme/ and are not validated by check-plugin-packaging.py
  # today (no `templates`/`bundle` component type); listed here for release auditability
  # and future validator extension. Same pattern as sdlc-workflows `files:` block.
  files:
    templates:
      - plugins/sdlc-programme/templates/requirements-spec.md
      - plugins/sdlc-programme/templates/design-spec.md
      - plugins/sdlc-programme/templates/test-spec.md
    bundle:
      - plugins/sdlc-programme/manifest.yaml
      - plugins/sdlc-programme/CONSTITUTION.md
      - plugins/sdlc-programme/README.md
      - plugins/sdlc-programme/pyproject.toml

# Workflow delegation plugin — Archon integration for parallel agent execution. EPIC #96.
# Delivered in 5 phases; all skills, scripts, and Docker assets are shipped with
# the plugin. Docker assets and docs live in the plugin directory directly and
# ship in-place — they are listed below under `files:` for release completeness
# and to aid `check-plugin-packaging.py`-style audits (future extension).
sdlc-workflows:
  skills:
    - source: skills/workflows-setup/SKILL.md
    - source: skills/workflows-run/SKILL.md
    - source: skills/workflows-status/SKILL.md
    - source: skills/author-workflow/SKILL.md
    - source: skills/deploy-team/SKILL.md
    - source: skills/manage-teams/SKILL.md
  agents:
    - source: agents/delegation/delegation-coordinator.md
  commands:
    - source: commands/sdlc-security-review.md
    - source: commands/sdlc-plan.md
    - source: commands/sdlc-implement.md
    - source: commands/sdlc-architecture-review.md
    - source: commands/sdlc-performance-review.md
    - source: commands/sdlc-code-quality-review.md
    - source: commands/sdlc-test-coverage-review.md
    - source: commands/sdlc-validate.md
    - source: commands/sdlc-synthesise-reviews.md
    - source: commands/sdlc-merge-results.md
  workflows:
    - source: workflows/sdlc-parallel-review.yaml
    - source: workflows/sdlc-feature-development.yaml
    - source: workflows/sdlc-bulk-refactor.yaml
    - source: workflows/sdlc-commissioned-pipeline.yaml
  scripts:
    # Authored in-plugin; listed for packaging audit. Ship in-place.
    - source: plugins/sdlc-workflows/scripts/preprocess_workflow.py
    - source: plugins/sdlc-workflows/scripts/resolve_credentials.py
    - source: plugins/sdlc-workflows/scripts/resolve_plugin_paths.py
    - source: plugins/sdlc-workflows/scripts/generate_team_claude_md.py
    - source: plugins/sdlc-workflows/scripts/generate_team_dockerfile.py
    - source: plugins/sdlc-workflows/scripts/validate_team_manifest.py
    - source: plugins/sdlc-workflows/scripts/coaching_signals.py
    - source: plugins/sdlc-workflows/scripts/override_logger.py
    - source: plugins/sdlc-workflows/scripts/team_inventory.py
    - source: plugins/sdlc-workflows/scripts/teams_status_report.py
    - source: plugins/sdlc-workflows/scripts/detect-loop-bug.sh
    - source: plugins/sdlc-workflows/scripts/loop-workaround.sh
    - source: plugins/sdlc-workflows/scripts/login.sh
    - source: plugins/sdlc-workflows/scripts/workflows_status_query.py
  # The following live in the plugin directory and ship in-place with the plugin.
  # They are not validated by check-plugin-packaging.py today (no `docker`/`docs`
  # component type); listed here for release auditability and future validator
  # extension. See EPIC #96 Phase 5.
  files:
    docker:
      - plugins/sdlc-workflows/docker/Dockerfile.base
      - plugins/sdlc-workflows/docker/Dockerfile.full
      - plugins/sdlc-workflows/docker/entrypoint.sh
      - plugins/sdlc-workflows/docker/build.sh
      - plugins/sdlc-workflows/docker/build-base.sh
      - plugins/sdlc-workflows/docker/build-full.sh
      - plugins/sdlc-workflows/docker/build-team.sh
      - plugins/sdlc-workflows/docker/docker-compose.yml
    docs:
      - plugins/sdlc-workflows/docs/quickstart.md
      - plugins/sdlc-workflows/docs/troubleshooting.md

# Release Mapping — defines how source files map to plugin directories
# Used by /sdlc:release-plugin to package source into distributable plugins
#
# Structure:
#   <plugin-name>:
#     <component-type>:
#       - source: <path relative to repo root>
#         dest: <path relative to plugin root> (optional, inferred from source basename)

sdlc-core:
  skills:
    - source: skills/validate/SKILL.md
    - source: skills/new-feature/SKILL.md
    - source: skills/new-feature/templates/proposal.md
    - source: skills/new-feature/templates/retrospective.md
    - source: skills/commit/SKILL.md
    - source: skills/pr/SKILL.md
    - source: skills/rules/SKILL.md
    - source: CONSTITUTION.md
      dest: skills/rules/constitution.md
    - source: skills/setup-team/SKILL.md
    - source: skills/setup-ci/SKILL.md
    - source: skills/setup-ci/templates/python.yml
    - source: skills/setup-ci/templates/javascript.yml
    - source: skills/setup-ci/templates/go.yml
    - source: skills/release-plugin/SKILL.md
    - source: skills/commission/SKILL.md
    - source: skills/commission/templates/sample-bundle/manifest.yaml
    - source: skills/commission/templates/sample-bundle/CONSTITUTION.md
    - source: skills/commission/templates/sample-bundle/agents/sample-agent.md
    - source: skills/commission/templates/sample-bundle/skills/sample-skill/SKILL.md
    - source: skills/commission/templates/sample-bundle/templates/feature-proposal.md
  agents:
    - source: agents/core/sdlc-enforcer.md
    - source: agents/core/critical-goal-reviewer.md
    - source: agents/testing/code-review-specialist.md
    - source: agents/core/verification-enforcer.md
  scripts:
    # Only scripts invoked by plugin hooks (see plugins/sdlc-core/hooks/hooks.json)
    # belong here. The validation pipeline runs through the `validate` skill,
    # not via wrapper scripts shipped at this path.
    - source: tools/validation/check-tmp-usage.py
    # Commissioning helpers — authored in-plugin, ship in-place. Listed here
    # so check-plugin-packaging.py audits their presence and the release
    # process knows about them.
    - source: plugins/sdlc-core/scripts/__init__.py
    - source: plugins/sdlc-core/scripts/commission/__init__.py
    - source: plugins/sdlc-core/scripts/commission/manifest.py
    - source: plugins/sdlc-core/scripts/commission/installer.py
    - source: plugins/sdlc-core/scripts/commission/recorder.py
  hooks:
    - source: plugins/sdlc-core/hooks/hooks.json
  data:
    - source: data/technology-registry/_index.yaml
    - source: data/technology-registry/aws.yaml
    - source: data/technology-registry/azure.yaml
    - source: data/technology-registry/django.yaml
    - source: data/technology-registry/docker.yaml
    - source: data/technology-registry/elasticsearch.yaml
    - source: data/technology-registry/express.yaml
    - source: data/technology-registry/fastapi.yaml
    - source: data/technology-registry/flask.yaml
    - source: data/technology-registry/flink.yaml
    - source: data/technology-registry/gcp.yaml
    - source: data/technology-registry/github-actions.yaml
    - source: data/technology-registry/go.yaml
    - source: data/technology-registry/java.yaml
    - source: data/technology-registry/kafka.yaml
    - source: data/technology-registry/kubernetes.yaml
    - source: data/technology-registry/mongodb.yaml
    - source: data/technology-registry/mysql.yaml
    - source: data/technology-registry/nextjs.yaml
    - source: data/technology-registry/postgresql.yaml
    - source: data/technology-registry/python.yaml
    - source: data/technology-registry/rabbitmq.yaml
    - source: data/technology-registry/react.yaml
    - source: data/technology-registry/redis.yaml
    - source: data/technology-registry/ruby.yaml
    - source: data/technology-registry/rust.yaml
    - source: data/technology-registry/sqlite.yaml
    - source: data/technology-registry/streamlit.yaml
    - source: data/technology-registry/stripe.yaml

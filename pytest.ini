[pytest]
# Pytest configuration for ai-first-sdlc-practices.
#
# Markers let developers scope runs for fast-feedback loops:
#
#   pytest -m "not slow"         — skip long-running tests
#   pytest -m "not docker"       — skip tests that require a Docker daemon
#   pytest -m "not credentials"  — skip tests that exercise the credential resolver
#   pytest -m "not e2e"          — skip end-to-end orchestration tests
#
# Unmarked tests run in every invocation.  CI runs the full suite.
#
# Integration test fixtures (mini-projects under tests/integration/*/fixtures/)
# are NOT collected — they contain their own pytest suites that assume their
# own project roots and are exercised by the integration-smoke scripts instead.
norecursedirs =
    tests/integration/delegation-smoke/fixtures
    tests/integration/setup-smoke/fixtures
    tests/integration/team-smoke/fixtures
    tests/integration/workforce-smoke/fixtures

markers =
    slow: tests that take >1s (concurrency, large fixtures)
    docker: tests that require a running Docker daemon
    credentials: tests that exercise the credential resolver or Keychain
    e2e: end-to-end workflow orchestration tests
